runConfig:
  minInstances: 1

env:
  # Firebase Public Config — per-environment via secrets
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    secret: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    availability:
      - BUILD
      - RUNTIME

  # App URL — used for Clerk allowedRedirectOrigins
  - variable: NEXT_PUBLIC_APP_URL
    secret: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME

  # Allowed emails (comma-separated)
  - variable: ALLOWED_EMAILS
    value: "maidirivas2003@gmail.com,mariokarajallo92@gmail.com,sbeardman92@gmail.com"
    availability:
      - RUNTIME

  # Clerk
  - variable: NEXT_PUBLIC_CLERK_SIGN_IN_URL
    value: /sign-in
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CLERK_SIGN_UP_URL
    value: /sign-up
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
    value: /
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
    value: /
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    value: pk_test_c2FjcmVkLWNhbWVsLTE5LmNsZXJrLmFjY291bnRzLmRldiQ
    availability:
      - BUILD
      - RUNTIME

  # Firebase Admin SDK — per-environment via secrets
  # FIREBASE_PROJECT_ID, CLERK_SECRET_KEY, ADMIN_CLIENT_EMAIL, ADMIN_PRIVATE_KEY
  # se configuran via: firebase apphosting:secrets:set <NAME> --project <PROJECT>
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - RUNTIME

  - variable: CLERK_SECRET_KEY
    secret: CLERK_SECRET_KEY
    availability:
      - RUNTIME

  - variable: ADMIN_CLIENT_EMAIL
    secret: ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: ADMIN_PRIVATE_KEY
    secret: ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME
